<div class="article" id="article-{{ index }}">
    <div class="article-header">
        <h1>{{ article.title }}</h1>
        {% if article.subtitle %}
        <p class="subtitle">{{ article.subtitle }}</p>
        {% endif %}
        <p class="meta">{{ article.source_type | upper }} &nbsp;·&nbsp; {{ article.generated_at[:10] }}</p>
    </div>
    <div class="article-body">
        {{ article.body_html }}
    </div>
    <div class="article-footer">
        {% if article.tags %}
        <p class="tags">Topics: {{ article.tags | join(", ") }}</p>
        {% endif %}
        <p>Source: <a href="{{ article.source_url }}">{{ article.source_url }}</a></p>
    </div>
</div>
